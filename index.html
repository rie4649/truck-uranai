<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のラッキートラック</title>
<link rel="icon" type="image/png" href="truck-icon-192.png">
<link rel="apple-touch-icon" href="truck-icon-192.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1565c0">

<style>
body{
font-family:sans-serif;
background:#f4f7fa;
text-align:center;
padding:40px;
}

h1{
color:#1565c0;
}

button{
font-size:24px;
padding:15px 30px;
border:none;
border-radius:10px;
background:#1565c0;
color:white;
cursor:pointer;
}

#result{
margin-top:30px;
font-size:24px;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
max-width:700px;
margin-left:auto;
margin-right:auto;
}

/* ===== アプリを追加ボタン ===== */
#installBtn{
display:none;position:fixed;top:14px;right:14px;z-index:9999;
background:#1565c0;color:#fff;border:none;border-radius:999px;
padding:10px 18px;font-size:14px;font-weight:bold;cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.25);
}
#installHelp{
display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);
z-index:10000;align-items:center;justify-content:center;padding:20px;
}
#installHelp .box{background:#fff;border-radius:14px;padding:22px;max-width:340px;width:100%;text-align:left}
#installHelp h3{margin:0 0 10px;color:#1565c0}
#installHelp p{font-size:13px;color:#555;line-height:1.7}
#installHelp button{
margin-top:14px;width:100%;padding:10px;border:none;border-radius:8px;
background:#ddd;font-weight:bold;cursor:pointer;font-size:14px;
}
</style>
</head>

<body>

<button id="installBtn">📲 アプリを追加</button>
<div id="installHelp">
<div class="box">
<h3>アプリとして追加する方法</h3>
<p id="installHelpText"></p>
<button id="closeInstallHelp">閉じる</button>
</div>
</div>

<h1>🚛 今日のラッキートラック 🚛</h1>

<button onclick="uranai()">占う</button>

<div id="result">
ボタンを押して占ってね✨
</div>

<script>
/* ===== アプリとして追加(PWAインストール) ===== */
if("serviceWorker" in navigator){
window.addEventListener("load", ()=>{
navigator.serviceWorker.register("sw.js").catch(()=>{});
});
}

let deferredInstallPrompt = null;
const installBtn = document.getElementById("installBtn");
let autoPromptTried = false;

async function tryAutoPrompt(){
if(autoPromptTried || !deferredInstallPrompt) return;
autoPromptTried = true;
try{
deferredInstallPrompt.prompt();
const choice = await deferredInstallPrompt.userChoice;
if(choice.outcome === "accepted"){ installBtn.style.display = "none"; }
deferredInstallPrompt = null;
}catch(err){ console.error("auto install prompt failed", err); }
}

window.addEventListener("beforeinstallprompt", (e)=>{
e.preventDefault();
deferredInstallPrompt = e;
installBtn.style.display = "inline-flex";
tryAutoPrompt();
});

window.addEventListener("appinstalled", ()=>{
installBtn.style.display = "none";
deferredInstallPrompt = null;
});

function detectManualInstallText(){
const ua = navigator.userAgent;
const isMac = /Macintosh/.test(ua);
const isWin = /Windows/.test(ua);
const isSafari = /Safari/.test(ua) && !/Chrome|Chromium|Edg/.test(ua);
if(isSafari && isMac) return "Safariのメニューバーで「ファイル」→「Dockに追加」を選んでください。(Safari 17以降)";
if(isSafari) return "共有ボタン(□に↑のアイコン)をタップし、「ホーム画面に追加」を選んでください。";
if(isWin || isMac) return "アドレスバー右端の「インストール」アイコンをクリックしてください。表示されない場合は、ブラウザ右上のメニュー(⋮)から「アプリをインストール」を選んでください。";
return "ブラウザのメニューから「ホーム画面に追加」または「インストール」を選んでください。";
}

installBtn.addEventListener("click", async ()=>{
if(deferredInstallPrompt){
deferredInstallPrompt.prompt();
const choice = await deferredInstallPrompt.userChoice;
deferredInstallPrompt = null;
if(choice.outcome === "accepted") installBtn.style.display = "none";
return;
}
document.getElementById("installHelpText").textContent = detectManualInstallText();
document.getElementById("installHelp").style.display = "flex";
});

document.getElementById("closeInstallHelp").onclick = ()=>{
document.getElementById("installHelp").style.display = "none";
};

if(!("onbeforeinstallprompt" in window)){
installBtn.style.display = "inline-flex";
}

/* ===== ここから元のアプリのロジック(変更なし) ===== */
const fortunes = [

"340：今日はエンジン音がやさしい日。あなたも周りにひと声かけると仕事運がふわっと上がる。かもね",

"567：小さなラッキーが転がってくる日。落ちてるチャンスは拾って吉。かもよ",

"アームロール：今日は“テコでも動かない集中力”が手に入る日。一気に片付けると快感。やほい！",

"いすゞ25ｔ：今日は頼られる日。あなたの一言がチームを救う。一発ギャグでね",

"265：軽やかに動ける日。迷ったら軽い方を選ぶと吉。なんちゃって",

"セルフ：今日は自分で決めるが最強。判断力が冴えわたる。かっこいいね",

"６ヒアロング：今日は視野が広がる日。周りを見ると良いヒントが落ちてる。事務所にやさしくしてみてね",

"5ｔ：今日はコツコツが勝つ日。積み重ねた分だけ運が返ってくる。いえい！",

"3ｔワイド：今日は広く受け止めると吉。人の相談に乗ると運気UP。ぐいんとね",

"576：今日は数字の流れが良い日。時間管理がうまくいく。やったあ",

"440：今日は丸く収まる日。トラブルが自然と消えていく。だったらいね",

"青パッカー：今日は爽やかな風が吹く日。気分転換が仕事運を押し上げる。なんちゃって",

"５ヒア：今日はひらめきが降りてくる日。ひらめいたら報告よろしく",

"620：今日は安定感バツグン。焦らず進めば全部うまくいく。ラッキー",

"ヒノ8ｔ：今日はパワー全開。重い仕事ほど運気が上がる。パワー！！",

"ツートン：今日は二択が当たる日。直感を信じてOK。うえぇい！",

"3ｔパッカー：今日は整理整頓が運気を呼ぶ。きもちもすっきりだね！",

"白パッカー：今日は清潔感がカギ。身の回りを整えると気持ちも整う。なんてね",

"３ヒア：今日は新しいことに挑戦すると吉。小さな一歩が大きな成果に。",

"640：今日は数字に強い日。語呂合わせ考えてみてね",

"950：今日は気づきが多い日。いつもと違う視点で見ると吉。",

"2.9：今日はスピード勝負。早めの行動が運を引き寄せる。マッハでね",

"ヒノ：今日は頼れる日。あなたの判断が周りを助ける。かっこいい！",

"10ｔ：今日はどっしり構えると吉。焦らないことが最大の武器。",

"230：今日は軽快に動ける日。テンポよく進めると全部うまくいくYO!",

"8ｔ：今日は安定感が抜群。あなたの存在が周りを安心させるかもよ",

"セルフ：今日はセルフケアが大事。自分をいたわると運が戻ってラッキーデー",

"3ｔ：今日は軽やかに動ける日。よ！背中に羽生えちゃうかもよ",

"10ｔ：今日は重い腰が上がる日。やりたくなかったことはすすんでレッツトライ！",

"三菱ワイド：今日は視野が広がる日。新しいアイデアが湧いてくる。わお！"
];

function uranai() {
const random = fortunes[Math.floor(Math.random() * fortunes.length)];

document.getElementById("result").innerHTML =
"<h2>" + random + "</h2><br>🚛 今日もご安全に！";
}

</script>

</body>
</html>
